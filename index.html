<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Smart Phone Hub</title>
<style>
body { margin:0; font-family:Arial, sans-serif; background:#0a0a0a; color:white; }
header { background:#151515; padding:12px; text-align:center; font-size:18px; }
.container { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; }
.card { background:#1e1e1e; padding:20px; border-radius:20px; text-align:center; cursor:pointer; font-size:14px; }
.card:active { background:#333; }
#main { padding:10px; }
#output { background:#000; padding:10px; border-radius:10px; height:200px; overflow:auto; margin-top:10px; }
button { padding:10px; border:none; border-radius:10px; background:#00ffc3; margin:5px 0; width:100%; font-size:16px; }
.face { font-size:50px; text-align:center; }
.hands { font-size:40px; text-align:center; margin-top:5px; }
textarea, input { width:95%; padding:10px; margin:5px 0; border-radius:10px; border:none; }
iframe { width:100%; height:250px; border:none; border-radius:10px; margin-top:10px; }
</style>
</head>
<body>
<header>📱 Ultimate Smart Phone Hub</header>

<div class="container">
  <div class="card" onclick="openSection('ai')">🤖 AI</div>
  <div class="card" onclick="openSection('code')">💻 Code</div>
  <div class="card" onclick="openSection('game')">🎮 Maker</div>
  <div class="card" onclick="openSection('mini')">🕹 Games</div>
  <div class="card" onclick="openSection('savage')">😈 Savage AI</div>
  <div class="card" onclick="openSection('fun')">🎉 Fun</div>
  <div class="card" onclick="openSection('tricks')">🃏 Tricks</div>
</div>

<div id="main"></div>

<script>
// === Voice helpers ===
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(u);
}

function startMic(callback){
  try{
    const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang='en-US';
    rec.start();
    rec.onresult=(e)=>callback(e.results[0][0].transcript);
  }catch(e){alert('Mic not supported');}
}

// === Section Loader ===
function openSection(section){
  const main=document.getElementById('main');
  main.innerHTML=''; // clear previous content

  if(section==='ai'){
    main.innerHTML=`
      <h2>AI Assistant</h2>
      <button id='aiMic'>🎤 Talk</button>
      <div id='output'></div>`;
    document.getElementById('aiMic').onclick=()=>startMic(handleAI);
  }

  else if(section==='savage'){
    main.innerHTML=`
      <h2>Savage AI 😈</h2>
      <div id='face' class='face'>😐</div>
      <div id='hands' class='hands'>🤲</div>
      <button id='savageMic'>🎤 Talk</button>
      <div id='output'></div>`;
    document.getElementById('savageMic').onclick=()=>startMic(handleSavage);
  }

  else if(section==='code'){
    main.innerHTML=`
      <h2>Coding Assistant</h2>
      <textarea id='codeInput' placeholder='Describe code...'></textarea>
      <button id='genCode'>Generate</button>
      <pre id='output'></pre>`;
    document.getElementById('genCode').onclick=generateCode;
  }

  else if(section==='game'){
    main.innerHTML=`
      <h2>Game Maker</h2>
      <textarea id='gameInput' placeholder='Describe game...'></textarea>
      <button id='genGame'>Create</button>
      <pre id='output'></pre>
      <iframe id='frame'></iframe>`;
    document.getElementById('genGame').onclick=generateGame;
  }

  else if(section==='mini'){
    main.innerHTML=`
      <h2>Click Game</h2>
      <button id='clickBtn'>Tap</button>
      <p id='s'>0</p>`;
    window.score=0;
    document.getElementById('clickBtn').onclick=()=>score++;
    setInterval(()=>{document.getElementById('s').innerText=score},100);
  }

  else if(section==='fun'){
    main.innerHTML=`
      <h2>Fun Zone 🎉</h2>
      <button onclick="alert('Surprise! 🎁')">Press me!</button>
      <button onclick="document.body.style.background = '#'+Math.floor(Math.random()*16777215).toString(16)">Random Colors</button>
      <button onclick="document.getElementById('main').innerHTML += '<p>🎲 Dice Roll: '+Math.floor(Math.random()*6+1)+'</p>'">Roll Dice</button>`;
  }

  else if(section==='tricks'){
    main.innerHTML=`
      <h2>Tricks & Jokes 🃏</h2>
      <button onclick="alert('Knock Knock! Who's there? AI 😎')">Knock Knock</button>
      <button onclick="alert('Try closing the browser... just kidding 😏')">Fake Trick</button>
      <button onclick="document.getElementById('main').innerHTML += '<p>🤯 Mind Trick: Look behind you!</p>'">Mind Trick</button>`;
  }
}

// === AI Logic ===
function smartReply(input){
  input=input.toLowerCase();
  if(input.includes('hello')) return "Hey, what's up?";
  if(input.includes('your name')) return "I'm your phone brain.";
  if(input.includes('help')) return "Try the game maker or coding tool.";
  return "I heard: " + input;
}

function handleAI(text){
  const out=document.getElementById('output');
  let reply=smartReply(text);
  out.innerHTML+=`<p>You: ${text}</p><p>AI: ${reply}</p>`;
  speak(reply);
}

// === Savage AI Logic ===
function savageReply(input){
  input=input.toLowerCase();
  if(input.includes('hello')) return {t:'Oh great... YOU again.',f:'🙄',h:'🖐'};
  if(input.includes('how are you')) return {t:'Living in your phone... tragic.',f:'😑',h:'🤦'};
  if(input.includes('help')) return {t:'Figure it out yourself genius.',f:'😏',h:'👉'};
  return {t:'That made no sense.',f:'🤨',h:'🤷'};
}

function handleSavage(text){
  const out=document.getElementById('output');
  const face=document.getElementById('face');
  const hands=document.getElementById('hands');
  let r=savageReply(text);
  face.innerText=r.f;
  hands.innerText=r.h;
  out.innerHTML+=`<p>You: ${text}</p><p>Savage: ${r.t}</p>`;
  speak(r.t);
}

// === Coding Helper ===
function generateCode(){
  const input=document.getElementById('codeInput').value;
  const out=document.getElementById('output');
  let code="console.log('hello world');";
  if(input.includes('button')){
    code=`<button onclick="alert('yo')">click</button>`;
  }
  out.innerText=code;
}

// === Game Maker ===
function generateGame(){
  const input=document.getElementById('gameInput').value;
  const out=document.getElementById('output');
  const frame=document.getElementById('frame');

  let game=`<html><body style='background:black;color:white;text-align:center;'>
  <h1>Game</h1><button onclick="alert('win')">Win</button></body></html>`;

  if(input.includes('click')){
    game=`<html><body style='background:black;color:white;text-align:center;'>
    <h1>Clicker</h1>
    <button onclick="score++">Tap</button>
    <p id='s'>0</p>
    <script>let score=0;setInterval(()=>{document.getElementById('s').innerText=score},100)</script>
    </body></html>`;
  }

  out.innerText=game;
  frame.srcdoc=game;
}

</script>
</body>
</html>
